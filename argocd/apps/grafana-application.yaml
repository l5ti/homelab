apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/l5ti/homelab.git
    targetRevision: main
    path: apps/grafana

  destination:
    server: https://kubernetes.default.svc
    namespace: grafana

  syncPolicy:
    syncOptions:
      - CreateNamespace=true