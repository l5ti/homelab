apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  finalizers:
    - resources-finalizers.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 10.5.15
    helm:
      values: |
        replicas: 1

        adminUser: admin
        adminPassword: admin

        service:
          type: ClusterIP
          port: 80

        ingress:
          enabled: true
          ingressClassName: traefik
          hosts:
            - grafana.local
          path: /
          pathType: Prefix

        persistence:
          enabled: true
          type: pvc
          size: 2Gi

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: grafana

  syncPolicy:
    syncOptions:
      - CreateNamespace=true